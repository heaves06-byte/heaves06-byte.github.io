<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>西贡美食导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #1a1814;
    --surface2: #222018;
    --border: #2e2b24;
    --gold: #d4a853;
    --gold-light: #e8c47a;
    --red: #c94a4a;
    --text: #ede8dc;
    --text-muted: #7a7265;
    --text-dim: #4a4740;
    --walk: #4caf82;
    --ride: #d4a853;
    --far: #c94a4a;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .serif { font-family: 'Noto Serif SC', serif; }

  /* Header */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,13,11,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }

  .header-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  /* Location bar */
  #loc-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    margin: 12px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #loc-bar:active { background: var(--surface2); border-color: var(--gold); }

  .radar-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(212,168,83,0.12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .radar-icon::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1.5px solid rgba(212,168,83,0.3);
    animation: radar-pulse 2s ease-out infinite;
  }
  @keyframes radar-pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .loc-text { flex: 1; }
  .loc-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .loc-value { font-size: 13px; color: var(--text); font-weight: 500; margin-top: 1px; }

  /* Filter tabs */
  .filter-wrap {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 0 16px 12px;
    scrollbar-width: none;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0e0d0b;
  }

  /* Sort info */
  .sort-info {
    padding: 0 16px 8px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Cards */
  #cards-list { padding: 0 16px 100px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 3px 0 0 3px;
  }
  .card:active { transform: scale(0.985); border-color: var(--gold); box-shadow: 0 0 20px rgba(212,168,83,0.08); }
  .card:active::before { opacity: 1; }

  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .card-rank {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    flex-shrink: 0; margin-top: 2px;
  }
  .card-rank.top { background: rgba(212,168,83,0.15); border-color: rgba(212,168,83,0.4); color: var(--gold); }

  .card-info { flex: 1; min-width: 0; }
  .card-name { font-family: 'Noto Serif SC', serif; font-weight: 400; font-size: 15px; color: var(--text); line-height: 1.3; }
  .card-vn { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .stars { font-size: 12px; color: var(--gold); margin-top: 5px; letter-spacing: 1px; }
  .stars .empty { color: var(--text-dim); }

  .card-dist {
    flex-shrink: 0;
    text-align: right;
    min-width: 72px;
  }
  .dist-num {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .dist-unit { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .dist-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    margin-top: 5px;
    letter-spacing: 0.03em;
  }
  .dist-badge.walk { background: rgba(76,175,130,0.15); color: var(--walk); }
  .dist-badge.ride { background: rgba(212,168,83,0.15); color: var(--ride); }
  .dist-badge.far { background: rgba(201,74,74,0.15); color: var(--far); }

  .card-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-category {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.05em;
  }
  .card-price {
    font-size: 12px;
    color: var(--gold-light);
    font-weight: 500;
  }

  /* Modal */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.3s;
    display: flex; align-items: flex-end;
  }
  #modal-overlay.active {
    background: rgba(0,0,0,0.7);
    pointer-events: all;
  }
  #modal-sheet {
    width: 100%;
    max-height: 90vh;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #modal-overlay.active #modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .modal-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-header-name { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 400; line-height: 1.3; }
  .modal-header-vn { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 3px; }
  .modal-stars { font-size: 16px; color: var(--gold); margin-top: 8px; letter-spacing: 2px; }
  .modal-stars .empty { color: var(--text-dim); }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px;
    overscroll-behavior: contain;
  }
  .modal-body::-webkit-scrollbar { width: 3px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .modal-section-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .modal-section-title:first-child { margin-top: 0; }

  .modal-desc {
    font-size: 14px;
    line-height: 1.75;
    color: #c8c2b5;
    white-space: pre-line;
  }

  .modal-price-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--gold-light);
    line-height: 1.6;
  }

  .modal-footer {
    padding: 14px 20px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; gap: 10px;
  }

  .btn-map {
    flex: 1;
    background: var(--gold);
    color: #0e0d0b;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.18s, transform 0.1s;
  }
  .btn-map:active { opacity: 0.85; transform: scale(0.98); }

  .btn-close-modal {
    width: 52px; height: 52px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .btn-close-modal:active { background: var(--border); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }

  /* Card appear anim */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: cardIn 0.3s ease both; }

  /* Distance pending */
  .dist-pending { color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div class="header-title serif">西贡美食导航</div>

    </div>
    <div style="font-size:22px;">🍜</div>
  </div>
</div>

<div id="loc-bar" onclick="requestLocation()">
  <div class="radar-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2a10 10 0 0 1 10 10"/>
      <path d="M12 6a6 6 0 0 1 6 6"/>
      <path d="M12 10a2 2 0 0 1 2 2"/>
    </svg>
  </div>
  <div class="loc-text">

    <div class="loc-value" id="loc-value">🏨 JB Central Apartment</div>
  </div>
  <div style="color:var(--text-dim); font-size:13px;">↻</div>
</div>

<div class="filter-wrap" id="filter-wrap">
  <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
  <button class="filter-btn" onclick="setFilter('noodle', this)">🍜 河粉 &amp; 粉面</button>

</div>

<div class="sort-info" id="sort-info">📌 按距离排序 · 点击卡片查看详情</div>

<div id="cards-list"></div>

<!-- Modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-header-name" id="m-name"></div>
      <div class="modal-header-vn" id="m-vn"></div>
      <div class="modal-stars" id="m-stars"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer">
      <button class="btn-close-modal" onclick="closeModal()">✕</button>
      <button class="btn-map" id="m-map-btn" onclick="openMap()">

        在 Google Maps 中开启
      </button>
    </div>
  </div>
</div>

// ─── STATE ────────────────────────────────────────────────────────────────────
// JB Central Apartment, Ho Chi Minh City
const DEFAULT_LAT = 10.7769;
const DEFAULT_LNG = 106.7009;

let userLat = DEFAULT_LAT;
let userLng = DEFAULT_LNG;
let locLabel = "🏨 JB Central Apartment";
let currentFilter = 'all';
let activeRestaurant = null;

// ─── HAVERSINE ────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000; // metres
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  if (m < 1000) return { val: Math.round(m) + 'm', badge: 'walk', label: '步行可达' };
  if (m < 3000) return { val: (m/1000).toFixed(1) + 'km', badge: 'ride', label: '建议打车' };
  return { val: (m/1000).toFixed(1) + 'km', badge: 'far', label: '较远打车' };
}

// ─── STARS ────────────────────────────────────────────────────────────────────
function renderStars(str) {
  return str.replace(/★/g, '<span>★</span>').replace(/☆/g, '<span class="empty">☆</span>');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getFiltered() {
  if (currentFilter === 'all') return restaurants;
  return restaurants.filter(r => r.category === currentFilter);
}

function renderCards() {
  const list = getFiltered();
  // compute distances
  const withDist = list.map((r, i) => ({
    ...r,
    dist: haversine(userLat, userLng, r.lat, r.lng),
    origIdx: i
  }));
  withDist.sort((a, b) => a.dist - b.dist);

  const container = document.getElementById('cards-list');
  container.innerHTML = '';

  if (withDist.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无餐厅</div>';
    return;
  }

  document.getElementById('count-label').textContent = `${withDist.length} 家餐厅`;

  withDist.forEach((r, idx) => {
    const d = fmtDist(r.dist);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx * 0.04) + 's';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-rank ${idx < 3 ? 'top' : ''}">${idx + 1}</div>
        <div class="card-info">
          <div class="card-name">${r.name_cn}</div>
          <div class="card-vn">${r.name_vn}</div>
          <div class="stars">${renderStars(r.rating_stars)}</div>
        </div>
        <div class="card-dist">
          <div class="dist-num">${d.val}</div>
          <div class="dist-badge ${d.badge}">${d.label}</div>
        </div>
      </div>
      <div class="card-bottom">
        <span class="card-category">${r.cat_label}</span>
        <span class="card-price">${r.price_info.split('约')[1] ? '约' + r.price_info.split('约')[1] : r.price_info}</span>
      </div>
    `;
    card.onclick = () => openModal(r);
    container.appendChild(card);
  });
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(r) {
  activeRestaurant = r;
  document.getElementById('m-name').textContent = r.name_cn;
  document.getElementById('m-vn').textContent = r.name_vn;
  document.getElementById('m-stars').innerHTML = renderStars(r.rating_stars);

  const d = fmtDist(haversine(userLat, userLng, r.lat, r.lng));
  document.getElementById('m-body').innerHTML = `
    <div class="modal-section-title">📍 距离 &amp; 位置</div>
    <div class="modal-price-box" style="color:var(--text)">
      <span style="font-size:20px;font-weight:700;color:var(--gold)">${d.val}</span>
      <span style="margin-left:8px;color:var(--text-muted);font-size:13px">${d.label}</span>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${r.address}</div>
    </div>

    <div class="modal-section-title">🍜 特色菜品与说明</div>
    <div class="modal-desc">${r.full_desc}</div>

    <div class="modal-section-title">💰 价格参考</div>
    <div class="modal-price-box">${r.price_info}</div>
  `;

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
  activeRestaurant = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function openMap() {
  if (activeRestaurant) window.open(activeRestaurant.map_url, '_blank');
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── LOCATION ─────────────────────────────────────────────────────────────────
function updateLocBar() {
  document.getElementById('loc-value').textContent = locLabel;
}

function requestLocation() {
  const locVal = document.getElementById('loc-value');
  locVal.textContent = '⏳ 定位中…';

  if (!navigator.geolocation) {
    locVal.textContent = '❌ 浏览器不支持定位';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      locLabel = '📍 我的当前位置';
      updateLocBar();
      document.getElementById('sort-info').textContent = '📡 已定位 · 实时距离排序';
      renderCards();
    },
    err => {
      locLabel = '🏨 JB Central Apartment';
      userLat = DEFAULT_LAT;
      userLng = DEFAULT_LNG;
      updateLocBar();
      let msg = '定位失败，使用酒店位置';
      if (err.code === 1) msg = '已拒绝定位权限，使用酒店位置';
      document.getElementById('sort-info').textContent = '⚠️ ' + msg;
      renderCards();
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
  );
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderCards();
</script>
</body>
</html>
