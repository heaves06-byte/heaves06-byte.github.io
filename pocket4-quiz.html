<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osmo Pocket 4 适配度测试</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0A0A0D;
  --card: #13131A;
  --card2: #1A1A24;
  --border: #252530;
  --accent: #FF5500;
  --accent2: #FFB000;
  --accent-glow: rgba(255, 85, 0, 0.18);
  --text: #F0F0EC;
  --text-muted: #80808A;
  --text-dim: #50505A;
  --sel-bg: rgba(255, 85, 0, 0.10);
  --sel-border: #FF5500;
  --radius: 14px;
  --radius-lg: 22px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ===== LANDING ===== */
#landing {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}
#landing::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,85,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.landing-badge {
  display: inline-block;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.landing-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(36px, 8vw, 58px);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 40%, #FF7030 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.landing-sub {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 320px;
  margin: 0 auto 12px;
}
.landing-tags {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 40px;
}
.tag {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-muted);
}
.btn-start {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 16px 48px;
  font-size: 17px;
  font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 30px rgba(255,85,0,0.35);
  letter-spacing: 0.5px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 40px rgba(255,85,0,0.5); }
.btn-start:active { transform: translateY(0); }
.landing-disclaimer {
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-dim);
}
.landing-camera-icon {
  font-size: 60px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 20px rgba(255,85,0,0.4));
}

/* ===== QUIZ SCREEN ===== */
#quiz {
  padding: 0;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}
.quiz-header {
  padding: 20px 20px 0;
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(to bottom, var(--bg) 80%, transparent);
}
.quiz-progress-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.quiz-step {
  font-size: 12px; color: var(--text-muted); white-space: nowrap; min-width: 64px;
}
.progress-bar-bg {
  flex: 1; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.quiz-body {
  padding: 8px 20px 32px;
  flex: 1;
}
.q-tag {
  font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 10px;
}
.q-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(18px, 4.5vw, 24px);
  font-weight: 700;
  line-height: 1.35;
  margin-bottom: 10px;
}
.q-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 6px;
}
.q-note {
  font-size: 11px;
  color: var(--accent2);
  margin-bottom: 20px;
  display: inline-block;
  background: rgba(255,176,0,0.08);
  border-radius: 4px;
  padding: 3px 8px;
}
.options-list {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px;
}
.option-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 15px 16px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
  position: relative;
  display: flex; align-items: flex-start; gap: 12px;
}
.option-btn:hover {
  border-color: rgba(255,85,0,0.4);
  background: rgba(255,85,0,0.04);
}
.option-btn.selected {
  border-color: var(--sel-border);
  background: var(--sel-bg);
}
.option-check {
  width: 20px; height: 20px; min-width: 20px;
  border: 2px solid var(--border);
  border-radius: 50%;
  margin-top: 1px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.option-btn.selected .option-check {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.option-check-square {
  width: 20px; height: 20px; min-width: 20px;
  border: 2px solid var(--border);
  border-radius: 5px;
  margin-top: 1px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.option-btn.selected .option-check-square {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-next {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0.4;
  pointer-events: none;
}
.btn-next.enabled {
  opacity: 1;
  pointer-events: auto;
  box-shadow: 0 0 20px rgba(255,85,0,0.3);
}
.btn-next.enabled:hover { transform: translateY(-1px); box-shadow: 0 4px 30px rgba(255,85,0,0.45); }
.q11-notice {
  background: rgba(255,176,0,0.07);
  border: 1px solid rgba(255,176,0,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--accent2);
  line-height: 1.6;
}

/* ===== TRANSITION ===== */
.fade-in { animation: fadeSlideIn 0.35s ease forwards; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== RESULTS ===== */
#results { padding: 0; max-width: 640px; margin: 0 auto; width: 100%; }
.results-hero {
  background: linear-gradient(160deg, #13131A 0%, #1A1220 100%);
  border-bottom: 1px solid var(--border);
  padding: 40px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.results-hero::before {
  content: '';
  position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,85,0,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.results-label {
  font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 12px;
}
.results-score-big {
  font-family: 'Syne', sans-serif;
  font-size: clamp(70px, 18vw, 110px);
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, #FF5500 0%, #FFB000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.results-score-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 18px; }
.results-stars { font-size: 22px; margin-bottom: 14px; }
.results-badge {
  display: inline-block;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 8px 20px;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 0;
}
.results-body { padding: 0 20px 48px; }
.section {
  margin-top: 28px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 20px;
}
.section-label {
  font-size: 11px; color: var(--accent); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 10px;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 700; margin-bottom: 12px;
}
.insight-text {
  font-size: 14px; color: var(--text-muted); line-height: 1.8;
  font-style: italic;
  border-left: 3px solid var(--accent);
  padding-left: 14px;
}
.rec-strength {
  background: var(--card2);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 12px;
}
.rec-kit {
  font-size: 13px; color: var(--text-muted); line-height: 1.7;
}
.kit-highlight {
  display: inline-block;
  background: rgba(255,85,0,0.1);
  border: 1px solid rgba(255,85,0,0.25);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 700;
}
.reasons-list { display: flex; flex-direction: column; gap: 14px; }
.reason-item {
  display: flex; align-items: flex-start; gap: 12px;
}
.reason-icon {
  width: 36px; height: 36px; min-width: 36px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.reason-text-wrap { flex: 1; }
.reason-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.reason-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.caveat-text {
  font-size: 13px; color: var(--text-muted); line-height: 1.75;
}
.spending-tag {
  display: inline-block;
  background: rgba(255,176,0,0.1);
  border: 1px solid rgba(255,176,0,0.25);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 13px;
  color: var(--accent2);
  font-weight: 700;
  margin-bottom: 8px;
}
.spending-text { font-size: 13px; color: var(--text-muted); line-height: 1.75; }
.alt-list { display: flex; flex-direction: column; gap: 10px; }
.alt-item {
  background: var(--card2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}
.alt-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
.fomo-text { font-size: 13px; line-height: 1.8; color: var(--text-muted); }
.fomo-text em { color: var(--text); font-style: normal; font-weight: 500; }
.btn-retry {
  width: 100%;
  margin-top: 32px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}
.btn-retry:hover { border-color: var(--accent); color: var(--accent); }
.dim-bars {
  display: flex; gap: 8px; margin-top: 16px;
}
.dim-bar { flex: 1; }
.dim-bar-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.dim-bar-bg { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1) 0.3s; }
.dim-bar-val { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-align: right; }

@media (max-width: 480px) {
  .results-hero { padding: 32px 18px 28px; }
  .results-body { padding: 0 16px 40px; }
  .section { padding: 18px 16px; }
  .quiz-body { padding: 8px 16px 28px; }
}
</style>
</head>
<body>

<!-- ===== LANDING SCREEN ===== -->
<div id="landing" class="screen active">
  <div class="landing-camera-icon">📷</div>
  <div class="landing-badge">DJI · 大学生适配测试</div>
  <h1 class="landing-title">Pocket 4<br>适合你吗？</h1>
  <p class="landing-sub">11 题测出你的校园创作适配度<br>附消费能力专属分析</p>
  <div class="landing-tags">
    <span class="tag">✦ 1 英寸 CMOS</span>
    <span class="tag">✦ 智能跟随 7.0</span>
    <span class="tag">✦ 190.5g</span>
    <span class="tag">✦ ¥2999 起</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始测试 →</button>
  <p class="landing-disclaimer">约 2 分钟完成 · 答案真实才准</p>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-progress-row">
      <span class="quiz-step" id="stepLabel">1 / 11</span>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:9%"></div>
      </div>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div id="results" class="screen">
  <div class="results-hero">
    <p class="results-label">你的 Pocket 4 适配度</p>
    <div class="results-score-big" id="resScore">82</div>
    <p class="results-score-sub" id="resScoreSub">匹配分数 / 100</p>
    <div class="results-stars" id="resStars">⭐⭐⭐⭐</div>
    <div class="results-badge" id="resBadge">📸 氛围感准博主</div>
  </div>
  <div class="results-body" id="resultsBody"></div>
</div>

<script>
/* ============================================================
   SCORING CONFIGURATION
   All weights and thresholds centralized here for easy tuning.
   ============================================================ */

// Q1: Multi-select (max 2), contributes to Ecosystem score
const Q1_ITEM_SCORES = {
  phone:      5,   // 手机拍也挺好
  camera:     15,  // 相机吃灰
  drone:      10,  // 无人机
  pocket12:   15,  // Pocket 1/2
  pocket3:    2,   // Pocket 3 (special case, may rise to 12)
  action:     12,  // Action用户
  osmomobile: 10,  // Osmo Mobile
  newbie:     0,   // 纯纯小白
};

// Q2: Single select, contributes to Scene score
const Q2_SCORES = { A: 12, B: 10, C: 6, D: 2 };

// Q3: Multi-select (max 3), Scene matching coefficients
const Q3_COEFFICIENTS = {
  travel:  1.0,  // 旅行出游
  daily:   1.0,  // 宿舍日常
  food:    1.0,  // 探店美食
  night:   0.9,  // 暗光夜景
  events:  0.8,  // 社团活动
  sports:  0.5,  // 户外运动
  nothing: 0.1,  // 几乎不拍
};
const Q3_BASE = 35;
const Q3_BONUS_PER_HIGH_ITEM = 2;
const Q3_HIGH_THRESHOLD = 0.8;

// Q4: Single select, splits into Scene + Pain scores
const Q4_SCENE_SCORES = { A: 6, B: 4, C: 0, D: 2 };
const Q4_PAIN_SCORES  = { A: 10, B: 6, C: 0, D: 0 };

// Q5: Single select, Pain score
const Q5_PAIN_SCORES = { A: 10, B: 12, C: 4, D: 6, E: 0 };

// Q6: Single select, Scene score (防抖需求)
const Q6_SCENE_SCORES = { A: 12, B: 4, C: 0, D: 0 };

// Q7: Multi-select (max 3), Pain score per item
const Q7_ITEM_SCORES = {
  storage:  8,   // 内存满/忘带卡
  noise:    10,  // 夜景噪点
  audio:    10,  // 收音差
  color:    8,   // 颜色灰/调色难
  battery:  8,   // 没电
  water:    0,   // 怕水/娇气 (triggers rec adjustment, no score)
  good:     0,   // 心态好
};

// Q8: Single select, Pain score (后期态度)
const Q8_PAIN_SCORES = { A: 8, B: 5, C: 0, D: 0 };

// Q9: Single select, Ecosystem score
const Q9_ECO_SCORES = { A: 12, B: 8, C: 5, D: 0, E: 10 };

// Q10: Single select, Pain score (期望解决的核心痛点)
const Q10_PAIN_SCORES = { A: 8, B: 10, C: 10, D: 8, E: 2 };

// Dimension caps
const ECO_CAP   = 35;
const SCENE_CAP = 35;
const PAIN_CAP  = 30;

// Recommendation thresholds
const TIER_THRESHOLDS = { STRONG: 85, GOOD: 70, MAYBE: 55, WEAK: 40 };

/* ============================================================
   QUESTION DATA
   ============================================================ */
const QUESTIONS = [
  {
    id: 'q1', type: 'multi', max: 2,
    tag: '设备现状',
    title: '你的"创作装备"现状是？',
    subtitle: '每次刷到别人的旅行大片、氛围感 vlog，你都会收藏然后……继续用手机将就。你的设备现状是？',
    note: '可多选，最多 2 项',
    options: [
      { id: 'phone',      text: '手机拍也挺好，主打一个真实记录' },
      { id: 'camera',     text: '有一台相机……但它常年在我宿舍抽屉里吃灰，太重了真的带不出门' },
      { id: 'drone',      text: '无人机飞得很爽，但一落地就只能掏出手机，瞬间打回原形' },
      { id: 'pocket12',   text: '已经入了 Pocket 1/2，但总感觉差点意思' },
      { id: 'pocket3',    text: 'Pocket 3 在手，听说 4 出了，有点心痒' },
      { id: 'action',     text: 'Action 用户，运动时很稳，但拍人总觉得哪里不对' },
      { id: 'osmomobile', text: '在用 Osmo Mobile，每次夹手机、调平衡，热情已经耗尽' },
      { id: 'newbie',     text: '纯纯小白，正在寻找人生第一台"不后悔"的拍摄设备' },
    ]
  },
  {
    id: 'q2', type: 'single',
    tag: '出行频率',
    title: '你一年大概会出门"值得记录"的次数？',
    subtitle: '不算教室和食堂，你一年真正想掏出设备认真记录的时刻有多少？',
    options: [
      { id: 'A', text: '几乎每周都出去浪，朋友圈日更选手' },
      { id: 'B', text: '一个月 1–2 次，周末特种兵 or 探店打卡' },
      { id: 'C', text: '一学期 2–3 次，主要靠长假和寒暑假撑场面' },
      { id: 'D', text: '很少出远门，生活半径基本在校门口两公里' },
    ]
  },
  {
    id: 'q3', type: 'multi', max: 3,
    tag: '拍摄场景',
    title: '你手机相册里，哪种素材占比最高？',
    subtitle: '翻翻你的相册最近 30 天，什么画面出现得最多？（老实选，我们不告诉别人）',
    note: '多选，最多 3 项',
    options: [
      { id: 'travel',  text: '旅行出游的照片和视频——机票酒店都花了，不拍等于白去' },
      { id: 'daily',   text: '宿舍日常、食堂干饭、校园里的无聊但可爱瞬间' },
      { id: 'food',    text: '探店/美食/和姐妹的精心摆拍合照（每一张都修过）' },
      { id: 'night',   text: '操场音乐节、夜晚的校园、昏暗但很有氛围感的那种' },
      { id: 'events',  text: '社团活动、舞台表演、篮球赛——想记录但每次拍出来都像座机画质' },
      { id: 'sports',  text: '健身/滑板/户外跑——动起来的那种' },
      { id: 'nothing', text: '相册里全是截图和作业' },
    ]
  },

   ============================================================ */
let currentQ = 0;        // 0-based index into QUESTIONS array
let answers = {};        // { q1: ['camera','phone'], q2: 'A', ... }
let spendingPower = null; // 'high' | 'mid-high' | 'mid-low' | 'low'

/* ============================================================
   QUIZ FLOW
   ============================================================ */
function startQuiz() {
  document.getElementById('landing').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  currentQ = 0;
  answers = {};
  spendingPower = null;
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const qNum = currentQ + 1;

  // Update progress
  document.getElementById('stepLabel').textContent = `${qNum} / ${total}`;
  document.getElementById('progressFill').style.width = `${(qNum / total) * 100}%`;

  // Build HTML
  const isMulti = q.type === 'multi';
  const currentSel = answers[q.id] || (isMulti ? [] : null);

  let optionsHTML = '';
  q.options.forEach(opt => {
    const checkEl = isMulti
      ? `<span class="option-check-square">${(currentSel || []).includes(opt.id) ? '✓' : ''}</span>`
      : `<span class="option-check">${currentSel === opt.id ? '✓' : ''}</span>`;
    const selClass = isMulti
      ? ((currentSel || []).includes(opt.id) ? 'selected' : '')
      : (currentSel === opt.id ? 'selected' : '');

    optionsHTML += `
      <button class="option-btn ${selClass}" onclick="selectOption('${q.id}','${opt.id}',${isMulti},${q.max || 1})">
        ${checkEl}
        <span>${opt.text}</span>
      </button>`;
  });

  const hasSelection = isMulti ? (currentSel.length > 0) : (currentSel !== null);
  const nextLabel = currentQ < QUESTIONS.length - 1 ? '下一题 →' : '查看我的适配度 →';

  document.getElementById('quizBody').innerHTML = `
    <div class="fade-in">
      <div class="q-tag">${q.tag}</div>
      <div class="q-title">${q.title}</div>
      ${q.subtitle ? `<div class="q-subtitle">${q.subtitle}</div>` : ''}
      ${q.note ? `<div class="q-note">${q.note}</div>` : ''}
      ${q.notice ? `<div class="q11-notice">${q.notice}</div>` : ''}
      <div class="options-list">${optionsHTML}</div>
      <button class="btn-next ${hasSelection ? 'enabled' : ''}" id="btnNext" onclick="nextQuestion()">
        ${nextLabel}
      </button>
    </div>`;
}

function selectOption(qId, optId, isMulti, maxSel) {
  if (isMulti) {
    if (!answers[qId]) answers[qId] = [];
    const idx = answers[qId].indexOf(optId);
    if (idx >= 0) {
      answers[qId].splice(idx, 1);
    } else {
      if (answers[qId].length < maxSel) {
        answers[qId].push(optId);
      } else {
        // Replace oldest
        answers[qId].shift();
        answers[qId].push(optId);
      }
    }
  } else {
    answers[qId] = optId;
    // Store spending power separately for Q11
    const q = QUESTIONS[currentQ];
    if (q.isSpendingQ) {
      const opt = q.options.find(o => o.id === optId);
      spendingPower = opt ? opt.spending : null;
    }
  }
  renderQuestion();
}

function nextQuestion() {
  const q = QUESTIONS[currentQ];
  const sel = answers[q.id];
  const hasSelection = Array.isArray(sel) ? sel.length > 0 : sel !== null && sel !== undefined;
  if (!hasSelection) return;

  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
    document.querySelector('.quiz-body') && (document.getElementById('quizBody').scrollTop = 0);
    window.scrollTo(0, 0);
  } else {
    showResults();
  }
}

/* ============================================================
   SCORING ENGINE
   ============================================================ */
function calculateScores() {
  let eco = 0, scene = 0, pain = 0;

  // ── Q1: Ecosystem (multi-select, max 2) ──
  const q1 = answers.q1 || [];
  if (q1.length > 0) {
    const q1vals = q1.map(k => Q1_ITEM_SCORES[k] || 0);
    const maxVal = Math.max(...q1vals);
    const bonus = q1.length > 1 ? 2 : 0;
    eco += maxVal + bonus;
  }

  // ── Q2: Scene (single) ──
  scene += Q2_SCORES[answers.q2] || 0;

  // ── Q3: Scene (multi-select, max 3) ──
  const q3 = answers.q3 || [];
  if (q3.length > 0) {
    const coeffs = q3.map(k => Q3_COEFFICIENTS[k] || 0);
    const maxCoeff = Math.max(...coeffs);
    let q3base = Q3_BASE * maxCoeff;
    const highItems = coeffs.filter(c => c >= Q3_HIGH_THRESHOLD).length;
    const bonus = Math.max(0, highItems - 1) * Q3_BONUS_PER_HIGH_ITEM;
    scene += Math.min(Q3_BASE, q3base + bonus);
  }

  // ── Q4: Scene + Pain (single) ──
  scene += Q4_SCENE_SCORES[answers.q4] || 0;
  pain  += Q4_PAIN_SCORES[answers.q4] || 0;

  // ── Q5: Pain (single) ──
  pain += Q5_PAIN_SCORES[answers.q5] || 0;

  // ── Q6: Scene (single, 防抖) ──
  scene += Q6_SCENE_SCORES[answers.q6] || 0;

  // ── Q7: Pain (multi-select, max 3) ──
  const q7 = answers.q7 || [];
  q7.forEach(k => { pain += Q7_ITEM_SCORES[k] || 0; });

  // ── Q8: Pain (single) ──
  pain += Q8_PAIN_SCORES[answers.q8] || 0;

  // ── Q9: Ecosystem (single) ──
  eco += Q9_ECO_SCORES[answers.q9] || 0;

  // ── Q10: Pain (single) ──
  pain += Q10_PAIN_SCORES[answers.q10] || 0;

  // ── Special Adjustments ──
  // 1. Pocket 3 upgrade case: if Q1 includes pocket3 AND Q7 has relevant pain points
  if (q1.includes('pocket3')) {
    const upgradePains = ['storage','noise','audio','color','battery'];
    const hasUpgradePain = q7.some(p => upgradePains.includes(p));
    if (hasUpgradePain) {
      eco = eco - 2 + 12; // Replace pocket3's base +2 with +12
    }
  }

  // 2. Sports-only Q3 with few pain points → deduct 10
  if (q3.length === 1 && q3[0] === 'sports' && q7.length <= 1) {
    const total = Math.min(eco, ECO_CAP) + Math.min(scene, SCENE_CAP) + Math.min(pain, PAIN_CAP);
    const adj = Math.max(0, total - 10);
    // We'll apply this after capping
  }

  // Cap each dimension
  const ecoFinal   = Math.min(eco, ECO_CAP);
  const sceneFinal = Math.min(scene, SCENE_CAP);
  const painFinal  = Math.min(pain, PAIN_CAP);

  let total = ecoFinal + sceneFinal + painFinal;

  // Apply sports-only penalty after capping
  if (q3.length === 1 && q3[0] === 'sports' && q7.length <= 1) {
    total = Math.max(0, total - 10);
  }

  return { eco: ecoFinal, scene: sceneFinal, pain: painFinal, total };
}

function getTier(score) {
  if (score >= TIER_THRESHOLDS.STRONG) return 'strong';
  if (score >= TIER_THRESHOLDS.GOOD)   return 'good';
  if (score >= TIER_THRESHOLDS.MAYBE)  return 'maybe';
  if (score >= TIER_THRESHOLDS.WEAK)   return 'weak';
  return 'no';
}

function getStars(tier) {
  return { strong:'⭐⭐⭐⭐⭐', good:'⭐⭐⭐⭐', maybe:'⭐⭐⭐', weak:'⭐⭐', no:'⭐' }[tier];

      spendingText: '好东西值得一步到位。全能套装不是溢价，是把能用上的配件都备好，省得之后一个个补购。'
    };
    if (spending === 'mid-high') return {
      strength: '你非常契合，理性对比后大概率会入手',
      kit: '<span class="kit-highlight">标准版 ¥2999</span> 性价比更高，核心功能已经全覆盖，配件可以后续按需补。',
      spendingLabel: '理性投资型',
      spendingText: '买对不买贵。标准版已经能满足你测试中暴露出的所有核心需求，不用为暂时用不上的配件多花钱。'
    };
    if (spending === 'mid-low') return {
      strength: '你是典型适合，但价格可能会让你犹豫',
      kit: '建议先去 <strong>DJI 线下体验店摸一下真机</strong>，或者关注大促活动时入手，冲动前先体验。',
      spendingLabel: '纠结但值得被说服型',
      spendingText: '去线下店摸一下真机，摸完心里就有答案了——大多数人摸完之后都会更有把握。'
    };
    return { // low
      strength: '产品很适合你，但预算可能是个坎',
      kit: '可以关注 <strong>教育优惠、活动价</strong>，或留意二手平台上的 Pocket 3——性价比也不错。',
      spendingLabel: '价值优先型',
      spendingText: '蹲一蹲教育优惠或活动价，等一个好时机入手，比冲动消费然后后悔更值得。'
    };
  }

  if (tier === 'good') {
    if (spending === 'high') return {
      strength: '可以买，虽然不是刚需但体验提升明显',
      kit: '<span class="kit-highlight">全能套装</span>看心情——如果你不介意多花点，一步到位体验更完整。',
      spendingLabel: '体验派玩家',
      spendingText: '为更好的记录体验付费，不亏。即使不是刚需，体验升级带来的愉悦感往往超出预期。'
    };
    if (spending === 'mid-high') return {
      strength: '值得入手，标准版就很够用',
      kit: '<span class="kit-highlight">标准版 ¥2999</span> 更理性，已经能覆盖你绝大部分需求。',
      spendingLabel: '精打细算型',
      spendingText: '标准版已经能覆盖你绝大部分需求，多花的 800 块配件可以等实际用到了再补购。'
    };
    if (spending === 'mid-low') return {
      strength: '你很合适，但建议别冲动，先体验再决定',
      kit: '建议<strong>观望活动价</strong>或去线下体验，不急的话可以蹲个好价。',
      spendingLabel: '犹豫但心动的类型',
      spendingText: '不急的话可以蹲个好价，等双十一或 DJI 官方促销，价格上的心理阻力会小很多。'
    };
    return { // low
      strength: '产品匹配，但价格可能是你的阻力',
      kit: '可以考虑 <strong>Osmo Mobile 手机云台（¥500 左右）</strong>或二手 Pocket 3，功能覆盖面也不错。',
      spendingLabel: '预算敏感型',
      spendingText: '手机云台或二手 Pocket 3 也是不错的选择——先用起来，等以后有预算了再考虑升级。'
    };
  }

  // maybe tier (55-69)
  if (spending === 'high' || spending === 'mid-high') return {
    strength: '可以买，但不是刚需，属于冲动消费型',
    kit: '<span class="kit-highlight">标准版</span>即可，不用上全能套装。',
    spendingLabel: '愿意为喜欢买单型',
    spendingText: '买了大概率不会后悔，但也可以再想想——你的使用频率决定了这笔钱值不值得花在这里。'
  };
  return {
    strength: '建议先去线下店体验，或者看看替代方案',
    kit: '不主动推荐直接购买，先体验再决定更稳妥。',
    spendingLabel: '谨慎观望型',
    spendingText: '不着急的话，先去摸摸真机再决定。线下体验往往比任何评测都更有说服力。'
  };
}

function getFOMO(score, spending) {
  const tier = getTier(score);
  const highSpend = spending === 'high' || spending === 'mid-high';

  if ((tier === 'strong' || tier === 'good') && highSpend) {
    return `<em>如果你没买：</em>下次旅行你可能还是会用手机拍完回家发现——夜景糊了、自拍歪了、收音全是风噪。然后在小红书刷到别人直出的视频，心想：「我当时怎么没早点买。」`;
  }
  if ((tier === 'strong' || tier === 'good') && !highSpend) {
    return `<em>如果不急着买：</em>你依然可以用手机记录生活，但那些需要"稳一点、亮一点、收音好一点"的瞬间，可能会留下一点遗憾。找个线下店摸一摸真机，或许能帮你下定决心。`;
  }
  if (tier === 'maybe' && highSpend) {
    return `<em>买了不会后悔，但也可以再想想——</em>毕竟你的记录频率可能没那么高。不过好东西带来的体验升级，往往超出预期。`;
  }
  return `记录生活的方式有很多，手机也能拍出好故事。<em>重要的是开始拍，而不是用什么拍。</em>`;
}

function getAlternatives(score) {
  const tier = getTier(score);
  const q3 = answers.q3 || [];
  const alts = [];

  if (tier === 'no' || tier === 'weak' || q3.includes('sports')) {
    alts.push({ name: 'DJI Action 5 Pro', desc: '运动场景、防水需求更强，适合爱好户外运动的创作者，画质同样出色。' });
  }
  alts.push({ name: 'DJI Osmo Mobile 6', desc: '¥700 左右，手机云台方案，适合暂时不想投入太多但想提升画质稳定性的同学。' });
  if (tier !== 'strong') {
    alts.push({ name: '等待 Pocket 4P / 下一代', desc: '如果需求没那么迫切，等下一个大促或新款发布，价格和功能都会更有吸引力。' });
  }
  return alts.slice(0, 2);
}

/* ============================================================
   RENDER RESULTS
   ============================================================ */
function showResults() {
  const { eco, scene, pain, total } = calculateScores();
  const score = Math.round(total);
  const tier = getTier(score);
  const personality = getPersonality(score);
  const stars = getStars(tier);
  const insight = getInsight();
  const reasons = getTopReasons();
  const caveats = getCaveats(score);
  const consumer = getConsumerModifier(score, spendingPower);
  const fomo = getFOMO(score, spendingPower);
  const alts = getAlternatives(score);

  // Update hero
  document.getElementById('resScore').textContent = score;
  document.getElementById('resStars').textContent = stars;
  document.getElementById('resBadge').textContent = personality;
  document.getElementById('resScoreSub').textContent = `适配度分数 / 100`;

  // Build results body
  const reasonsHTML = reasons.map(r => `
    <div class="reason-item">
      <div class="reason-icon">${r.icon}</div>
      <div class="reason-text-wrap">
        <div class="reason-title">${r.title}</div>
        <div class="reason-desc">${r.desc}</div>
      </div>
    </div>`).join('');

  const caveatsHTML = caveats.map(c => `<p class="caveat-text" style="margin-bottom:10px">⚠️ ${c}</p>`).join('');

  const altsHTML = alts.map(a => `
    <div class="alt-item">
      <div class="alt-name">${a.name}</div>
      ${a.desc}
    </div>`).join('');

  const spendingSection = consumer.spendingLabel ? `
    <div class="spending-tag">${consumer.spendingLabel}</div>
    <p class="spending-text">${consumer.spendingText}</p>` : `
    <p class="spending-text">${consumer.spendingText}</p>`;

  document.getElementById('resultsBody').innerHTML = `
    <!-- Dimension bars -->
    <div class="section" style="margin-top:20px">
      <div class="section-label">维度拆解</div>
      <div class="dim-bars">
        <div class="dim-bar">
          <div class="dim-bar-label">设备生态</div>
          <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${(eco/35)*100}%;background:linear-gradient(90deg,#FF5500,#FF8040)"></div></div>
          <div class="dim-bar-val">${eco}/35</div>
        </div>
        <div class="dim-bar">
          <div class="dim-bar-label">场景匹配</div>
          <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${(scene/35)*100}%;background:linear-gradient(90deg,#FF8040,#FFB000)"></div></div>
          <div class="dim-bar-val">${scene}/35</div>
        </div>
        <div class="dim-bar">
          <div class="dim-bar-label">痛点解决</div>
          <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${(pain/30)*100}%;background:linear-gradient(90deg,#FFB000,#FFD060)"></div></div>
          <div class="dim-bar-val">${pain}/30</div>
        </div>
      </div>
    </div>

    <!-- Insight -->
    <div class="section">
      <div class="section-label">被看穿了</div>
      <div class="insight-text">"${insight}"</div>
    </div>

    <!-- Recommendation -->
    <div class="section">
      <div class="section-label">推荐强度</div>
      <div class="rec-strength">${consumer.strength}</div>
      <div class="rec-kit">${consumer.kit}</div>
    </div>

    <!-- 3 Reasons -->
    <div class="section">
      <div class="section-label">Pocket 4 最懂你的 3 个理由</div>
      <div class="reasons-list">${reasonsHTML}</div>
    </div>

    <!-- Caveats -->
    <div class="section">
      <div class="section-label">可能有点小遗憾</div>
      ${caveatsHTML}
    </div>

    <!-- Consumer modifier -->
    <div class="section">
      <div class="section-label">从消费角度来看，你属于</div>
      ${spendingSection}
    </div>

    <!-- Alternatives -->
    <div class="section">
      <div class="section-label">如果你还在纠结</div>
      <div class="alt-list">${altsHTML}</div>
    </div>

    <!-- FOMO -->
    <div class="section" style="border-color:rgba(255,85,0,0.2)">
      <div class="section-label" style="color:var(--accent2)">最后说一句</div>
      <p class="fomo-text">${fomo}</p>
    </div>

    <button class="btn-retry" onclick="restartQuiz()">↩ 重新测试</button>
  `;

  // Switch to results screen
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('results').classList.add('active');
  window.scrollTo(0, 0);
}

function restartQuiz() {
  document.getElementById('results').classList.remove('active');
  currentQ = 0;
  answers = {};
  spendingPower = null;
  document.getElementById('quiz').classList.add('active');
  renderQuestion();
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
